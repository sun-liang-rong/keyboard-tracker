<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Window</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-drag: none;
    }

    html, body {
      width: 100px;
      height: 30px;
      overflow: hidden;
    }

    body {
      width: 100px;
      height: 30px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #floatingWindow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 2px 6px;
      width: 100px;
      height: 30px;
      background: rgba(31, 41, 55, 0.9);
      backdrop-filter: blur(8px);
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: grab;
    }

    #floatingWindow:hover {
      opacity: 1;
      background: rgba(31, 41, 55, 0.95);
    }

    #floatingWindow.dragging {
      cursor: grabbing;
      opacity: 1;
    }

    .icon {
      width: 12px;
      height: 12px;
      object-fit: contain;
      flex-shrink: 0;
      display: block;
      pointer-events: none; /* 让点击穿透到父元素 */
    }

    .count {
      font-size: 11px;
      font-weight: 600;
      color: #f3f4f6;
      flex-shrink: 0;
      line-height: 1;
      pointer-events: none;
    }

    .label {
      font-size: 10px;
      color: #9ca3af;
      flex-shrink: 0;
      line-height: 1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="floatingWindow">
    <img class="icon" id="logo" src="" alt="" />
    <span class="label">今日:</span>
    <span class="count" id="count">0</span>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const floatingWindow = document.getElementById('floatingWindow');
    const countEl = document.getElementById('count');
    const logoEl = document.getElementById('logo');

    let isDragging = false;
    let hasMoved = false;
    let dragStartPos = { x: 0, y: 0 };
    const DRAG_THRESHOLD = 5;

    // 更新计数
    ipcRenderer.on('update-count', (_, count) => {
      countEl.textContent = count.toLocaleString();
    });

    // 接收 logo 路径并设置图片
    ipcRenderer.on('logo-path', (_, logoPath) => {
      logoEl.src = logoPath;
    });

    // 通知主进程悬浮窗已加载完成
    ipcRenderer.send('floating-window-ready');

    // 智能鼠标穿透：鼠标在内容上时不穿透，离开时穿透
    // 延迟开启默认穿透，确保窗口已渲染
    setTimeout(() => {
      ipcRenderer.send('set-floating-ignore-mouse', true);
    }, 100);

    floatingWindow.addEventListener('mouseenter', () => {
      ipcRenderer.send('set-floating-ignore-mouse', false);
    });

    floatingWindow.addEventListener('mouseleave', () => {
      if (!isDragging) {
        ipcRenderer.send('set-floating-ignore-mouse', true);
      }
    });

    // 鼠标按下 - 开始拖拽
    floatingWindow.addEventListener('mousedown', (e) => {
      if (e.button === 0) {
        isDragging = true;
        hasMoved = false;
        dragStartPos = { x: e.screenX, y: e.screenY };
        floatingWindow.classList.add('dragging');
        // 确保拖拽时鼠标穿透关闭
        ipcRenderer.send('set-floating-ignore-mouse', false);
        ipcRenderer.send('start-drag', { x: e.screenX, y: e.screenY });
      }
    });

    // 鼠标移动 - 拖拽中（节流，每16ms最多发送一次）
    let lastDragTime = 0;
    window.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const now = Date.now();
        if (now - lastDragTime < 16) return; // 约60fps
        lastDragTime = now;

        const moveDistance = Math.sqrt(
          Math.pow(e.screenX - dragStartPos.x, 2) +
          Math.pow(e.screenY - dragStartPos.y, 2)
        );
        if (moveDistance > DRAG_THRESHOLD) {
          hasMoved = true;
        }
        ipcRenderer.send('dragging', { x: e.screenX, y: e.screenY });
      }
    });

    // 鼠标释放 - 结束拖拽
    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        floatingWindow.classList.remove('dragging');
        // 拖拽结束后，检查鼠标是否还在悬浮窗内
        const rect = floatingWindow.getBoundingClientRect();
        const mouseX = window.event?.clientX || 0;
        const mouseY = window.event?.clientY || 0;
        const isInside = mouseX >= 0 && mouseX <= rect.width && mouseY >= 0 && mouseY <= rect.height;
        if (!isInside) {
          ipcRenderer.send('set-floating-ignore-mouse', true);
        }
      }
    });

    // 点击打开主界面（只有没有拖拽时才触发）
    floatingWindow.addEventListener('click', (e) => {
      if (!hasMoved) {
        ipcRenderer.send('show-main-window');
      }
      hasMoved = false;
    });

    // 右键菜单
    floatingWindow.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      ipcRenderer.send('show-floating-menu');
    });
  </script>
</body>
</html>
