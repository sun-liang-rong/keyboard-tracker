<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Window</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      overflow: hidden;
    }

    .floating-window {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(0, 0, 0, 0.1);
      cursor: grab;
      transition: all 0.3s ease;
      opacity: 0.8;
    }

    .floating-window:hover {
      opacity: 1;
      transform: scale(1.02);
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.2);
    }

    .floating-window.dragging {
      cursor: grabbing;
      opacity: 1;
    }

    .icon {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .count {
      font-size: 14px;
      font-weight: 600;
      color: #1f2937;
    }

    .label {
      font-size: 12px;
      color: #6b7280;
      margin-right: 4px;
    }

    /* 深色模式 */
    @media (prefers-color-scheme: dark) {
      .floating-window {
        background: rgba(31, 41, 55, 0.9);
        border-color: rgba(255, 255, 255, 0.1);
      }

      .count {
        color: #f3f4f6;
      }

      .label {
        color: #9ca3af;
      }
    }
  </style>
</head>
<body>
  <div class="floating-window" id="floatingWindow">
    <img class="icon" src="../renderer/logo.png" alt="logo" />
    <span class="label">今日:</span>
    <span class="count" id="count">0</span>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const floatingWindow = document.getElementById('floatingWindow');
    const countEl = document.getElementById('count');

    let isDragging = false;
    let hasMoved = false; // 标记是否实际移动过（区分点击和拖拽）
    let dragStartPos = { x: 0, y: 0 }; // 拖拽起始位置
    const DRAG_THRESHOLD = 5; // 移动超过5像素才认为是拖拽

    // 更新计数
    ipcRenderer.on('update-count', (_, count) => {
      countEl.textContent = count.toLocaleString();
    });

    // 通知主进程悬浮窗已加载完成
    ipcRenderer.send('floating-window-ready');

    // 鼠标按下 - 开始拖拽
    floatingWindow.addEventListener('mousedown', (e) => {
      if (e.button === 0) { // 左键
        isDragging = true;
        hasMoved = false;
        dragStartPos = { x: e.screenX, y: e.screenY };
        dragOffset.x = e.clientX;
        dragOffset.y = e.clientY;
        floatingWindow.classList.add('dragging');
        ipcRenderer.send('start-drag', { x: e.screenX, y: e.screenY });
      }
    });

    // 鼠标移动 - 拖拽中
    window.addEventListener('mousemove', (e) => {
      if (isDragging) {
        // 检查是否移动超过阈值
        const moveDistance = Math.sqrt(
          Math.pow(e.screenX - dragStartPos.x, 2) +
          Math.pow(e.screenY - dragStartPos.y, 2)
        );
        if (moveDistance > DRAG_THRESHOLD) {
          hasMoved = true;
        }
        ipcRenderer.send('dragging', { x: e.screenX, y: e.screenY });
      }
    });

    // 鼠标释放 - 结束拖拽
    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        floatingWindow.classList.remove('dragging');
      }
    });

    // 点击打开主界面（只有没有拖拽时才触发）
    floatingWindow.addEventListener('click', (e) => {
      if (!hasMoved) {
        ipcRenderer.send('show-main-window');
      }
      // 重置移动标志
      hasMoved = false;
    });

    // 右键菜单
    floatingWindow.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      ipcRenderer.send('show-floating-menu');
    });

    // 处理拖拽偏移
    window.addEventListener('drag-offset', (e) => {
      dragOffset = e.detail;
    });
  </script>
</body>
</html>
